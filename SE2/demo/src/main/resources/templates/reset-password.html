<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Portal | Reset Password</title>
    <link rel="stylesheet" th:href="@{/css/se2-theme.css}">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(124, 58, 237, 0.05), transparent 18%),
                radial-gradient(circle at right center, rgba(59, 130, 246, 0.05), transparent 22%),
                linear-gradient(180deg, #fbfbfe 0%, #f6f7fb 100%);
            font-family: "Aptos", "Segoe UI", sans-serif;
            color: #1f2937;
        }
        .auth-page {
            width: min(720px, calc(100% - 32px));
            margin: 0 auto;
            padding: 40px 0;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 24px 54px rgba(15, 23, 42, 0.08);
        }
        .auth-card h1 {
            margin: 14px 0 0;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.02;
            letter-spacing: -0.05em;
        }
        .auth-card p {
            margin: 12px 0 0;
            color: #64748b;
            line-height: 1.65;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 38px;
            padding: 0 14px;
            border-radius: 999px;
            background: rgba(109, 40, 217, 0.08);
            color: #6d28d9;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-size: 0.78rem;
        }
        .alert {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 16px;
            font-weight: 700;
        }
        .alert-error { background: rgba(254, 226, 226, 0.9); color: #b91c1c; }
        .footer-links {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 18px;
        }
    </style>
</head>
<body>
<main class="auth-page">
    <section class="auth-card">
        <span class="badge">Set New Password</span>
        <h1>Create a new password</h1>
        <p>Choose a strong password for your account. This will replace the old one immediately after submission.</p>

        <div th:if="${param.error == 'password_mismatch'}" class="alert alert-error">
            The passwords do not match. Please try again.
        </div>
        <div th:if="${param.error == 'expired'}" class="alert alert-error">
            The reset token has expired. Please restart the password recovery flow.
        </div>

        <form th:action="@{/reset-password}" method="post" class="auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="token" th:value="${token}">
            <div class="field">
                <label for="password">New Password</label>
                <input id="password" name="password" type="password" placeholder="Enter new password" required minlength="8" autocomplete="new-password">
            </div>
            <div class="field">
                <label for="confirmPassword">Confirm Password</label>
                <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Repeat new password" required minlength="8" autocomplete="new-password">
            </div>
            <button type="submit" class="primary-button">Update Password</button>
        </form>

        <div class="footer-links">
            <a th:href="@{/forgot-password}" class="text-link">Start over</a>
            <a th:href="@{/login}" class="text-link">Back to sign in</a>
        </div>
    </section>
</main>
</body>
</html>
