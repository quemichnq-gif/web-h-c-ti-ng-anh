<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title>Assessments</title></head>
<body>
<div layout:fragment="content">

<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:28px;flex-wrap:wrap">
    <div>
        <h1 style="font-size:24px;font-weight:800;margin-bottom:4px">Assessment Management</h1>
        <p style="color:#94a3b8;font-size:14px">Manage both regular course assessments and remedial tests used in Error Management mappings.</p>
    </div>
    <a th:href="@{/assessments/create}" class="primary-button">+ Create Test</a>
</div>
<div th:if="${success}" data-auto-dismiss="1500" style="padding:14px 20px;border-radius:12px;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;font-weight:600;margin-bottom:20px" th:text="${success}"></div>

<article class="chart-card" style="margin-bottom:24px; padding: 24px;">
    <form method="get" th:action="@{/assessments}" class="filter-form">
        <div class="filter-group">
            <label class="filter-label">Filter by Type</label>
            <select name="type" class="filter-select">
                <option value="">All Types</option>
                <option value="COURSE_ASSESSMENT" th:selected="${selectedType == 'COURSE_ASSESSMENT'}">Course Assessment</option>
                <option value="REMEDIAL_TEST" th:selected="${selectedType == 'REMEDIAL_TEST'}">Remedial Test</option>
            </select>
        </div>
        <div class="filter-group">
            <label class="filter-label">Filter by Course</label>
            <select name="courseId" class="filter-select">
                <option value="">All Courses</option>
                <option th:each="c : ${courses}" th:value="${c.id}" th:selected="${c.id == selectedCourseId}" th:text="${c.name}">Course</option>
            </select>
        </div>
        <div class="filter-group">
            <label class="filter-label">Search</label>
            <input name="search" th:value="${search}" class="filter-input" placeholder="Title, code, or description...">
        </div>
        <div class="filter-group">
            <button type="submit" class="filter-submit-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Apply Filter
            </button>
        </div>
    </form>
</article>

<article class="chart-card">
    <div class="table-wrapper assessment-table-wrapper">
        <table class="data-table assessment-table">
            <thead><tr><th>#</th><th>Assessment</th><th>Type</th><th>Course</th><th>Duration</th><th>Questions</th><th>Actions</th></tr></thead>
            <tbody>
                <tr th:each="t,stat : ${tests}">
                    <td style="color:#94a3b8;font-size:13px" th:text="${stat.index+1}">1</td>
                    <td>
                        <div style="font-weight:700" th:text="${t.title}">Title</div>
                        <div style="font-size:12px;color:#2563eb;font-weight:700" th:text="${t.code}">CODE</div>
                        <div style="font-size:12px;color:#94a3b8" th:text="${t.description}">desc</div>
                    </td>
                    <td>
                        <span th:text="${t.assessmentType.name() == 'COURSE_ASSESSMENT' ? 'Course Assessment' : 'Remedial Test'}"
                              th:style="${t.assessmentType.name() == 'COURSE_ASSESSMENT' ? 'background:#eff6ff;color:#1d4ed8' : 'background:#fff7ed;color:#c2410c'} + ';padding:4px 10px;border-radius:99px;font-size:12px;font-weight:800'">Type</span>
                    </td>
                    <td style="font-size:13px" th:text="${t.course != null ? t.course.name : 'N/A'}">Course</td>
                    <td><span style="background:#eff6ff;color:#2563eb;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:700" th:text="${t.duration != null ? t.duration + ' min' : 'N/A'}">60 min</span></td>
                    <td style="font-weight:700;text-align:center" th:text="${questionCounts != null && questionCounts[t.id] != null ? questionCounts[t.id] : 0}">0</td>
                    <td style="vertical-align:middle">
                        <div style="display:flex;gap:6px;align-items:center;justify-content:center">
                            <a th:href="@{'/assessments/' + ${t.id} + '/edit'}" class="action-btn-mini edit-btn">Edit</a>
                            <a th:href="@{'/assessments/' + ${t.id} + '/results'}" class="action-btn-mini results-btn">Results</a>
                            <form th:action="@{'/assessments/' + ${t.id} + '/delete'}" method="post" onsubmit="return confirm('Delete this test?')" style="display:contents">
                                <button type="submit" class="action-btn-mini delete-btn">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(tests)}">
                    <td colspan="7" style="text-align:center;color:#94a3b8;padding:60px">No tests found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</article>

<style>
.filter-form {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 180px;
    gap: 20px;
    align-items: flex-end;
}

.filter-group {
    display: flex;
    flex-direction: column;
}

.filter-label {
    font-size: 13px;
    font-weight: 800;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    margin-left: 4px;
}

.filter-input, .filter-select {
    width: 100%;
    border: 2px solid #f1f5f9;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    background: #f8fafc;
    color: #1e293b;
    box-sizing: border-box;
}

.filter-input:hover, .filter-select:hover {
    border-color: #e2e8f0;
    background: #f1f5f9;
}

.filter-input:focus, .filter-select:focus {
    border-color: #6366f1;
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
}

.filter-submit-btn {
    width: 100%;
    background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 13px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
}

.filter-submit-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 15px rgba(79, 70, 229, 0.3);
    filter: brightness(1.1);
}

.filter-submit-btn:active {
    transform: translateY(0);
}

/* Action Buttons Styling */
.action-btn-mini {
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    text-decoration: none;
    transition: all 0.2s ease;
    border: 1px solid transparent;
    cursor: pointer;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.edit-btn {
    border-color: #e2e8f0;
    color: #475569;
    background: #ffffff;
}
.edit-btn:hover {
    background: #f8fafc;
    border-color: #cbd5e1;
    color: #1e293b;
}

.results-btn {
    background: #f0fdf4;
    color: #16a34a;
    border-color: #bbf7d0;
}
.results-btn:hover {
    background: #dcfce7;
    border-color: #86efac;
}

.delete-btn {
    background: #fef2f2;
    color: #dc2626;
    border-color: #fecaca;
}
.delete-btn:hover {
    background: #fee2e2;
    border-color: #fca5a5;
}

.assessment-table-wrapper .assessment-table thead th,
.assessment-table-wrapper .assessment-table tbody td {
    text-align: left !important;
    padding-left: 10px !important;
    padding-right: 8px !important;
}

.assessment-table-wrapper .assessment-table thead th:first-child,
.assessment-table-wrapper .assessment-table tbody td:first-child {
    width: 24px !important;
    padding-left: 14px !important;
    padding-right: 0 !important;
}

.assessment-table-wrapper .assessment-table thead th:last-child,
.assessment-table-wrapper .assessment-table tbody td:last-child {
    padding-right: 14px !important;
}

.assessment-table-wrapper .assessment-table tbody td:nth-child(6) {
    text-align: center !important;
}

.assessment-table-wrapper .assessment-table {
    min-width: 1000px;
}

.assessment-table-wrapper .assessment-table thead th:nth-child(2),
.assessment-table-wrapper .assessment-table tbody td:nth-child(2) {
    width: 30% !important;
    padding-left: 0 !important;
    padding-right: 4px !important;
}

.assessment-table-wrapper .assessment-table thead th:nth-child(3),
.assessment-table-wrapper .assessment-table tbody td:nth-child(3) {
    width: 13% !important;
}

.assessment-table-wrapper .assessment-table thead th:nth-child(4),
.assessment-table-wrapper .assessment-table tbody td:nth-child(4) {
    width: 18% !important;
    padding-left: 4px !important;
}

.assessment-table-wrapper .assessment-table thead th:nth-child(5),
.assessment-table-wrapper .assessment-table tbody td:nth-child(5) {
    width: 8% !important;
}

.assessment-table-wrapper .assessment-table thead th:nth-child(6),
.assessment-table-wrapper .assessment-table tbody td:nth-child(6) {
    width: 10% !important;
    text-align: center !important;
}

/* Column 7: Actions */
.assessment-table-wrapper .assessment-table thead th:nth-child(7),
.assessment-table-wrapper .assessment-table tbody td:nth-child(7) {
    width: 20% !important;
    text-align: center !important;
}

@media (max-width: 920px) {
    .filter-form {
        grid-template-columns: 1fr 1fr;
    }
}
@media (max-width: 768px) {
    .filter-form {
        grid-template-columns: 1fr;
    }
}
</style>

</div>
</body>
</html>
