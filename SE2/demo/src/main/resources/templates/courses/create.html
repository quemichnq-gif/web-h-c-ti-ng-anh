<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title>Create Course</title></head>
<body>
<div layout:fragment="content">

<div style="max-width:760px">
    <div style="margin-bottom:28px">
        <h1 style="font-size:24px;font-weight:800;margin-bottom:4px">Create New Course</h1>
        <p style="color:#94a3b8;font-size:14px">Create a fuller course record with code, lifecycle status, and tracking metadata.</p>
    </div>
    <article class="chart-card">
        <form th:action="@{/courses/create}" method="post">
            <div style="display:grid;gap:20px">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
                    <div class="field">
                        <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:8px">Course Code *</label>
                        <input name="code" maxlength="50" required placeholder="e.g. IELTS-W2-01" style="width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;box-sizing:border-box">
                    </div>
                    <div class="field">
                        <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:8px">Status *</label>
                        <select name="status" style="width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;background:#fff">
                            <option th:each="status : ${statuses}" th:value="${status.name()}" th:text="${status.name()}">OPEN</option>
                        </select>
                    </div>
                </div>
                <div class="field">
                    <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:8px">Course Title *</label>
                    <input name="name" maxlength="100" required placeholder="e.g. Advanced English I" style="width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;box-sizing:border-box">
                </div>
                <div class="field">
                    <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:8px">Description <span id="descCount" style="font-weight:400;color:#94a3b8">(0/500)</span></label>
                    <textarea name="description" id="descField" maxlength="500" rows="4" placeholder="Course syllabus summary..." style="width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;resize:vertical;box-sizing:border-box"></textarea>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
                    <div class="field">
                        <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:8px">Start Date *</label>
                        <input name="startDate" type="date" required style="width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;box-sizing:border-box">
                    </div>
                    <div class="field">
                        <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:8px">End Date *</label>
                        <input name="endDate" type="date" required id="endDate" style="width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;box-sizing:border-box">
                        <span id="dateErr" style="color:#ef4444;font-size:12px;display:none">End date must be after start date</span>
                    </div>
                </div>
            </div>
            <div style="display:flex;gap:12px;margin-top:28px;padding-top:24px;border-top:1px solid #f1f5f9">
                <button type="submit" class="primary-button">Publish Course</button>
                <a th:href="@{/courses}" class="secondary-button">Cancel</a>
            </div>
        </form>
    </article>
</div>
<script>
document.getElementById('descField').addEventListener('input', function() {
    document.getElementById('descCount').textContent = '(' + this.value.length + '/500)';
});
const now = new Date().toLocaleString();
</script>

</div>
</body>
</html>
