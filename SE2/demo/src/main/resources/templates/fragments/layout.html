<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$LAYOUT_TITLE | $CONTENT_TITLE">Academic Portal</title>
    <link rel="stylesheet" th:href="@{/css/se2-theme.css}">
    <style>
        /* Extra styles for the specific layout in the screenshot */
        .admin-shell {
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh;
            background: #f8f9fc;
            overflow: hidden;
        }
        .admin-sidebar {
            background: #fff;
            border-right: 1px solid #eff2f7;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-y: auto;
        }
        .admin-main {
            padding: 32px;
            overflow-y: auto;
            position: relative;
        }
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .search-bar {
            background: #fff;
            border: 1px solid #eff2f7;
            border-radius: 12px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 400px;
        }
        .search-bar input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 14px;
        }
        .nav-icons {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .nav-icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: #fff;
            border: 1px solid #eff2f7;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }
        .nav-icon-btn .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4d4d;
            color: #fff;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 10px;
            border: 2px solid #fff;
        }
        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }
        .brand-logo {
            width: 40px;
            height: 40px;
            background: #7c3aed;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }
        .menu-item {
            margin-bottom: 8px;
        }
        .menu-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: #64748b;
            font-weight: 600;
            transition: all 0.2s;
        }
        .menu-link:hover, .menu-link.active {
            background: #7c3aed;
            color: #fff;
        }
        .menu-link svg {
            width: 20px;
            height: 20px;
        }
        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 24px;
            border-top: 1px solid #eff2f7;
        }
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #eee;
            overflow: hidden;
        }
        .user-info {
            display: flex;
            flex-direction: column;
        }
        .user-name {
            font-weight: 700;
            font-size: 14px;
        }
        .user-role {
            font-size: 12px;
            color: #94a3b8;
        }
        
        .dashboard-header h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .dashboard-header p {
            color: #94a3b8;
            margin-bottom: 32px;
        }
        
        .stat-grid-premium {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }
        .stat-card-premium {
            background: #fff;
            padding: 24px;
            border-radius: 20px;
            border: 1px solid #eff2f7;
            position: relative;
        }
        .stat-card-premium .trend {
            position: absolute;
            top: 24px;
            right: 24px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .trend.up { color: #10b981; }
        .trend.down { color: #ef4444; }
        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .stat-label-p { color: #94a3b8; font-size: 14px; font-weight: 600; }
        .stat-value-p { font-size: 24px; font-weight: 800; margin-top: 4px; }
        
        .dashboard-main-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 24px;
        }
        .chart-card {
            background: #fff;
            padding: 24px;
            border-radius: 24px;
            border: 1px solid #eff2f7;
        }
        .activity-card {
            background: #fff;
            padding: 24px;
            border-radius: 24px;
            border: 1px solid #eff2f7;
        }
        .activity-item {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        .activity-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .activity-content h4 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
        .activity-content p { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
        .activity-content span { font-size: 11px; font-weight: 700; color: #cbd5e1; text-transform: uppercase; }
        
        .status-box {
            background: #fdf2ff;
            border: 1px solid #f5d0ff;
            border-radius: 16px;
            padding: 16px;
            margin-top: 24px;
        }
        .status-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #7c3aed;
            margin-bottom: 12px;
        }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 99px; }
    </style>
</head>
<body class="admin-shell">
    <aside class="admin-sidebar">
        <div>
            <div class="sidebar-brand">
                <div class="brand-logo">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                    </svg>
                </div>
                <div class="user-info">
                    <span class="user-name" style="font-size: 16px;">Academic Portal</span>
                    <span class="user-role" sec:authorize="hasRole('ADMIN')">ADMINISTRATOR</span>
                    <span class="user-role" sec:authorize="hasRole('ACADEMIC_STAFF')">STAFF</span>
                </div>
            </div>
            
            <ul class="sidebar-menu">
                <li class="menu-item"><a th:href="@{/}" class="menu-link active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard</a></li>
                <li sec:authorize="hasRole('ADMIN')" class="menu-item"><a th:href="@{/courses}" class="menu-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    Courses</a></li>
                <li sec:authorize="hasAnyRole('ADMIN', 'ACADEMIC_STAFF')" class="menu-item"><a th:href="@{/lessons}" class="menu-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6v12"></path><path d="M6 12h12"></path><path d="M4 4h16v16H4z"></path></svg>
                    Lessons</a></li>
                <!-- Admin/Staff Menu -->
                <li sec:authorize="hasAnyRole('ADMIN', 'ACADEMIC_STAFF')" class="menu-item"><a th:href="@{/enrollments}" class="menu-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle></svg>
                    Enrollments</a></li>
                <li sec:authorize="hasAnyRole('ADMIN', 'ACADEMIC_STAFF')" class="menu-item"><a th:href="@{/assessments}" class="menu-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path></svg>
                    Assessments</a></li>
                <li sec:authorize="hasAnyRole('ADMIN', 'ACADEMIC_STAFF')" class="menu-item"><a th:href="@{/errors}" class="menu-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path></svg>
                    Errors</a></li>
                
                <li sec:authorize="hasRole('ADMIN')" class="menu-item"><a th:href="@{/users}" class="menu-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path></svg>
                    Users</a></li>

                <!-- Student Menu -->
                <li sec:authorize="hasRole('STUDENT')" class="menu-item"><a th:href="@{/portal/courses}" class="menu-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                    Explore Courses</a></li>
                <li sec:authorize="hasRole('STUDENT')" class="menu-item"><a th:href="@{/portal/tests}" class="menu-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    My Tests</a></li>
                
                <li class="menu-item"><a th:href="@{/profile}" class="menu-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                    Profile</a></li>
            </ul>
        </div>
        
        <div class="sidebar-user">
            <div class="user-avatar">
                <img th:src="@{'https://ui-avatars.com/api/?name=' + ${#authentication.name} + '&background=7c3aed&color=fff'}" alt="Avatar">
            </div>
            <div class="user-info">
                <span class="user-name" sec:authentication="name">User Name</span>
                <span class="user-role" style="font-size: 10px;">Portal User</span>
            </div>
            <form th:action="@{/logout}" method="post" style="margin-left: auto;">
                <button type="submit" style="background:none; border:none; color:#94a3b8; cursor:pointer;">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1-2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </form>
        </div>
    </aside>

    <main class="admin-main">
        <nav class="top-nav">
            <div class="search-bar">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="Search students, records, or logs...">
            </div>
            
            <div class="nav-icons">
                <div class="nav-icon-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#64748b" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    <span class="badge">3</span>
                </div>
                <div class="nav-icon-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#64748b" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                </div>
                <a th:href="${#authorization.expression('hasAnyRole(''ADMIN'',''ACADEMIC_STAFF'')') ? '/admin/reports' : '/reports/my'}"
                   class="primary-button"
                   style="padding: 0 16px; min-height: 40px; border-radius: 10px; text-decoration:none">
                    + New Report
                </a>
            </div>
        </nav>

        <div layout:fragment="content"></div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Set active class based on current URL
            const currentPath = window.location.pathname;
            const menuLinks = document.querySelectorAll(".menu-link");
            menuLinks.forEach(link => {
                const linkPath = link.getAttribute("href");
                if (currentPath === linkPath || (linkPath !== "/" && currentPath.startsWith(linkPath))) {
                    link.classList.add("active");
                } else {
                    link.classList.remove("active");
                }
            });
        });
    </script>
</body>
</html>
