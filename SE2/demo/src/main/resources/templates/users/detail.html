<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>User Profile</title>
    <style>
        .profile-header { background: #fff; padding: 32px; border-radius: 24px; border: 1px solid #eff2f7; display: flex; gap: 32px; margin-bottom: 32px; align-items: center; }
        .avatar-lg { width: 120px; height: 120px; border-radius: 32px; background: #f5f3ff; color: #7c3aed; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 800; border: 4px solid #fff; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div layout:fragment="content">

<article class="profile-header">
    <div class="avatar-lg" th:text="${user.fullName != null ? (user.fullName.substring(0,1)) : user.username.substring(0,1).toUpperCase()}">U</div>
    <div style="flex:1">
        <div style="display:flex;justify-content:space-between;align-items:start">
            <div>
                <h1 style="font-size:28px;font-weight:900;margin-bottom:8px" th:text="${user.fullName != null ? user.fullName : user.username}">Full Name</h1>
                <div style="display:flex;gap:16px;color:#94a3b8;font-size:14px;font-weight:600">
                    <span th:text="${'ID: #' + user.id}">ID: #1</span>
                    <span th:text="${'@' + user.username}">@username</span>
                    <span th:text="${user.email}">email@example.com</span>
                </div>
            </div>
            <a th:href="@{/users}" class="secondary-button">← Back to User List</a>
        </div>
        <div style="margin-top:24px;display:flex;gap:12px">
            <span style="background:#f0fdf4;color:#166534;padding:6px 16px;border-radius:12px;font-size:12px;font-weight:800;border:1px solid #bbf7d0" th:text="${user.status}">ACTIVE</span>
            <span style="background:#fefce8;color:#854d0e;padding:6px 16px;border-radius:12px;font-size:12px;font-weight:800;border:1px solid #fef08a" th:text="${user.role}">ROLE</span>
        </div>
    </div>
</article>

<article class="chart-card">
    <h3 style="font-size:18px;font-weight:800;margin-bottom:20px">Personal Information</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <div>
            <label style="font-size:12px;font-weight:700;color:#94a3b8;display:block;margin-bottom:4px">Full Name</label>
            <div style="font-weight:700" th:text="${user.fullName}">Name</div>
        </div>
        <div>
            <label style="font-size:12px;font-weight:700;color:#94a3b8;display:block;margin-bottom:4px">Email Address</label>
            <div style="font-weight:700" th:text="${user.email}">email</div>
        </div>
        <div>
            <label style="font-size:12px;font-weight:700;color:#94a3b8;display:block;margin-bottom:4px">Phone Number</label>
            <div style="font-weight:700" th:text="${user.phone != null ? user.phone : 'Not provided'}">phone</div>
        </div>
        <div>
            <label style="font-size:12px;font-weight:700;color:#94a3b8;display:block;margin-bottom:4px">System Role</label>
            <div style="font-weight:700" th:text="${user.role}">role</div>
        </div>
        <div>
            <label style="font-size:12px;font-weight:700;color:#94a3b8;display:block;margin-bottom:4px">Created Time</label>
            <div style="font-weight:700" th:text="${user.createdAt != null ? #temporals.format(user.createdAt,'dd/MM/yyyy HH:mm') : 'N/A'}">created</div>
        </div>
    </div>
</article>

</div>
</body>
</html>
