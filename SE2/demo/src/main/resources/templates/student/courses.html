<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title>Explore Courses</title></head>
<body>
<div layout:fragment="content">

<div style="margin-bottom:32px">
    <h1 style="font-size:24px;font-weight:900;margin-bottom:6px">Explore Academic Catalog</h1>
    <p style="color:#94a3b8;font-size:14px">Enroll in English courses to expand your knowledge and level up.</p>
</div>

<article th:if="${success}" data-auto-dismiss="1500" style="padding:16px;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;border-radius:12px;margin-bottom:24px;font-weight:700">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:8px;vertical-align:middle"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <span th:text="${success}">Success</span>
</article>

<div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:24px">
    <article th:each="c : ${allCourses}" class="chart-card" style="padding:0;overflow:hidden;transition:transform 0.2s;position:relative">
        <div style="height:120px;background:linear-gradient(135deg,#7c3aed,#2563eb);padding:24px;color:#fff;display:flex;flex-direction:column;justify-content:flex-end">
            <h3 style="font-size:18px;font-weight:900" th:text="${c.name}">Course Name</h3>
            <div style="font-size:12px;opacity:0.8" th:text="${(c.startDate != null ? c.startDate : 'Flexible') + (c.endDate != null ? ' → ' + c.endDate : '')}">Date Range</div>
        </div>
        <div style="padding:24px">
            <p style="color:#64748b;font-size:13px;line-height:1.6;margin-bottom:24px;height:60px;overflow:hidden;text-overflow:ellipsis" th:text="${c.description}">Description</p>
            
            <div th:with="status=${enrollmentStatusMap != null ? enrollmentStatusMap[c.id] : null}">
                <div th:if="${status == null}">
                    <form th:action="@{/portal/enroll}" method="post">
                        <input type="hidden" name="courseId" th:value="${c.id}">
                        <button type="submit" class="primary-button" style="width:100%;height:44px;border-radius:12px">Enroll Now</button>
                    </form>
                </div>
                <div th:unless="${status == null}">
                    <div th:if="${status == 'PENDING'}" style="width:100%;height:44px;border-radius:12px;background:#fff7ed;color:#ea580c;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;border:1px solid #ffedd5">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="3" style="margin-right:8px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        Pending Approval
                    </div>
                    <div th:if="${status == 'APPROVED'}" style="display:grid;gap:10px">
                        <div style="width:100%;height:44px;border-radius:12px;background:#f0fdf4;color:#166534;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;border:1px solid #bbf7d0">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="3" style="margin-right:8px"><polyline points="20 6 9 17 4 12"/></svg>
                            Enrolled
                        </div>
                        <a th:href="@{'/portal/courses/' + ${c.id} + '/lessons'}" class="primary-button" style="width:100%;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;text-decoration:none">
                            View Lessons
                        </a>
                    </div>
                    <div th:if="${status == 'REJECTED'}" style="width:100%;height:44px;border-radius:12px;background:#fef2f2;color:#991b1b;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;border:1px solid #fecaca">
                        Rejected
                    </div>
                </div>
            </div>
        </div>
    </article>
</div>

</div>
</body>
</html>
