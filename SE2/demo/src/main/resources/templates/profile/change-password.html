<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title>Change Password</title></head>
<body>
<div layout:fragment="content">

<div style="max-width:520px">
    <div style="margin-bottom:28px">
        <h1 style="font-size:24px;font-weight:800;margin-bottom:4px">Change Password</h1>
        <p style="color:#94a3b8;font-size:14px">Update your security credentials</p>
    </div>
    <div th:if="${error}" style="padding:14px 20px;border-radius:12px;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;font-weight:600;margin-bottom:20px" th:text="${error}"></div>
    <!-- Success toast -->
    <div id="successToast" th:if="${param.changed}" style="padding:16px 20px;border-radius:12px;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:12px">
        <span>✅</span>
        <div>
            <div>Password changed successfully!</div>
            <div style="font-weight:400;font-size:13px;margin-top:2px">You will be logged out in <span id="countdown">3</span> seconds...</div>
        </div>
    </div>
    <article class="chart-card">
        <form th:action="@{/profile/change-password}" method="post" id="pwForm">
            <div style="display:grid;gap:20px">
                <div class="field">
                    <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:8px">Current Password *</label>
                    <div style="position:relative">
                        <input name="currentPassword" id="cur" type="password" required placeholder="Your current password" style="width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 42px 10px 14px;font-size:14px;outline:none;box-sizing:border-box">
                        <button type="button" onclick="toggle('cur')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;font-size:18px">👁</button>
                    </div>
                </div>
                <div class="field">
                    <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:8px">New Password *</label>
                    <div style="position:relative">
                        <input name="newPassword" id="np" type="password" required minlength="8" placeholder="Min. 8 chars, uppercase, number, symbol" style="width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 42px 10px 14px;font-size:14px;outline:none;box-sizing:border-box">
                        <button type="button" onclick="toggle('np')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;font-size:18px">👁</button>
                    </div>
                    <div style="margin-top:8px;height:5px;border-radius:99px;background:#f1f5f9;overflow:hidden"><div id="bar" style="height:100%;width:0;border-radius:99px;transition:all 0.3s"></div></div>
                    <div style="display:flex;justify-content:space-between;margin-top:4px">
                        <span id="strengthLabel" style="font-size:11px;font-weight:700;color:#94a3b8"></span>
                        <span style="font-size:11px;color:#94a3b8">Min 8 chars • Uppercase • Number • Symbol</span>
                    </div>
                </div>
                <div class="field">
                    <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:8px">Confirm New Password *</label>
                    <div style="position:relative">
                        <input name="confirmPassword" id="cp" type="password" required placeholder="Repeat new password" style="width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 42px 10px 14px;font-size:14px;outline:none;box-sizing:border-box">
                        <button type="button" onclick="toggle('cp')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;font-size:18px">👁</button>
                    </div>
                    <span id="matchErr" style="color:#ef4444;font-size:12px;margin-top:4px;display:none">Passwords do not match</span>
                </div>
            </div>
            <div style="display:flex;gap:12px;margin-top:28px;padding-top:24px;border-top:1px solid #f1f5f9">
                <button type="submit" class="primary-button">Update Password</button>
                <a th:href="@{/profile}" class="secondary-button">Cancel</a>
            </div>
        </form>
    </article>
</div>
<script>
function toggle(id) {
    const f = document.getElementById(id);
    f.type = f.type === 'password' ? 'text' : 'password';
}
document.getElementById('np').addEventListener('input', function() {
    const pw = this.value;
    let s = 0;
    if (pw.length >= 8) s++;
    if (/[A-Z]/.test(pw)) s++;
    if (/[0-9]/.test(pw)) s++;
    if (/[^a-zA-Z0-9]/.test(pw)) s++;
    const colors = ['#ef4444','#f97316','#eab308','#10b981'];
    const labels = ['Weak','Fair','Good','Strong'];
    document.getElementById('bar').style.width = (s/4*100) + '%';
    document.getElementById('bar').style.background = colors[s-1] || '#f1f5f9';
    document.getElementById('strengthLabel').textContent = s > 0 ? labels[s-1] : '';
    document.getElementById('strengthLabel').style.color = colors[s-1] || '#94a3b8';
});
document.getElementById('cp').addEventListener('input', function() {
    const m = this.value === document.getElementById('np').value;
    document.getElementById('matchErr').style.display = this.value && !m ? 'block' : 'none';
});
// Auto-logout countdown
const toast = document.getElementById('successToast');
if (toast) {
    let n = 3;
    const int = setInterval(() => {
        n--;
        document.getElementById('countdown').textContent = n;
        if (n <= 0) { clearInterval(int); window.location.href = '/logout'; }
    }, 1000);
}
</script>

</div>
</body>
</html>
