<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Edit Profile</title>
    <style>
        .profile-edit-shell {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
            align-items: start;
            font-family: "Segoe UI Variable Display", "Segoe UI", "Aptos", sans-serif;
        }

        .profile-edit-title {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 22px;
        }

        .profile-edit-title h1,
        .profile-edit-side h2 {
            letter-spacing: -0.04em;
        }

        .profile-edit-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 44px;
            min-width: 160px;
            padding: 0 14px;
            border-radius: 12px;
            border: 1px solid rgba(109, 40, 217, 0.12);
            background: rgba(109, 40, 217, 0.08);
            color: var(--primary, #6d28d9);
            font-weight: 800;
            justify-content: center;
            text-align: center;
            box-sizing: border-box;
        }

        .profile-edit-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid #f1f5f9;
            flex-wrap: wrap;
        }

        .profile-edit-actions > * {
            min-height: 44px;
            min-width: 160px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .profile-edit-main,
        .profile-edit-side {
            background: rgba(255,255,255,0.98);
            border: 1px solid rgba(148,163,184,0.16);
            border-radius: 24px;
            box-shadow: 0 14px 30px rgba(15,23,42,0.05);
        }

        .profile-edit-main {
            padding: 24px;
        }

        @media (max-width: 980px) {
            .profile-edit-shell {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div layout:fragment="content">

<div class="profile-edit-shell">
    <article class="profile-edit-main">
        <div class="profile-edit-title">
            <div>
                <h1 style="font-size:24px;font-weight:900;margin-bottom:4px">Edit Profile</h1>
                <p style="color:#94a3b8;font-size:14px;line-height:1.6">Update your personal information</p>
            </div>
        </div>

        <div th:if="${profileSuccess}" data-auto-dismiss="1500" style="padding:14px 20px;border-radius:12px;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;font-weight:600;margin-bottom:20px" th:text="${profileSuccess}"></div>
        <div th:if="${error}" data-auto-dismiss="1500" style="padding:14px 20px;border-radius:12px;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;font-weight:600;margin-bottom:20px" th:text="${error}"></div>

        <div style="display:flex;align-items:center;gap:18px;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid #f1f5f9">
            <div id="avatarPreview" style="width:72px;height:72px;border-radius:16px;background:linear-gradient(135deg,#7c3aed,#2563eb);display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:800;overflow:hidden;flex:0 0 auto">
                <span th:text="${user.fullName != null ? user.fullName.substring(0,1).toUpperCase() : 'U'}">U</span>
            </div>
            <div>
                <div style="font-weight:800;font-size:16px;color:#1f2a44" th:text="${user.fullName}">Full Name</div>
                <div style="color:#94a3b8;font-size:13px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase" th:text="${user.role}">ROLE</div>
                <div style="margin-top:8px;color:#94a3b8;font-size:12px;line-height:1.5;max-width:420px">
                    Avatar is derived from your profile name. A real photo upload is not enabled yet.
                </div>
            </div>
        </div>

        <form th:action="@{/profile/edit}" method="post">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
                <div class="field" style="grid-column: span 2">
                    <label style="font-size:13px;font-weight:800;color:#374151;display:block;margin-bottom:8px">Full Name *</label>
                    <input name="fullName" th:value="${user.fullName}" required style="width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;box-sizing:border-box">
                </div>
                <div class="field">
                    <label style="font-size:13px;font-weight:800;color:#374151;display:block;margin-bottom:8px">Email Address *</label>
                    <input name="email" type="email" th:value="${user.email}" required id="emailField" style="width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;box-sizing:border-box">
                </div>
                <div class="field">
                    <label style="font-size:13px;font-weight:800;color:#374151;display:block;margin-bottom:8px">Phone Number</label>
                    <input name="phone" th:value="${user.phone}" placeholder="0901234567" inputmode="numeric" maxlength="10" pattern="[0-9]{10}" id="phoneField" style="width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;box-sizing:border-box">
                    <span id="phoneErr" style="color:#ef4444;font-size:12px;display:none">Must be exactly 10 digits</span>
                </div>
                <div class="field">
                    <label style="font-size:13px;font-weight:800;color:#374151;display:block;margin-bottom:8px">Username</label>
                    <input th:value="${user.username}" disabled style="width:100%;border:1px solid #f1f5f9;border-radius:10px;padding:10px 14px;font-size:14px;background:#f8fafc;color:#94a3b8;box-sizing:border-box">
                </div>
                <div class="field">
                    <label style="font-size:13px;font-weight:800;color:#374151;display:block;margin-bottom:8px">System Role</label>
                    <input th:value="${user.role}" disabled style="width:100%;border:1px solid #f1f5f9;border-radius:10px;padding:10px 14px;font-size:14px;background:#f8fafc;color:#94a3b8;box-sizing:border-box">
                </div>
            </div>

            <div class="profile-edit-actions">
                <button type="submit" class="primary-button">Save Profile</button>
                <a th:href="@{/profile/change-password}" class="secondary-button">Change Password</a>
                <a href="javascript:history.back()" class="profile-edit-back">Back</a>
            </div>
        </form>
    </article>

</div>

<script>
const phoneField = document.getElementById('phoneField');
const phoneErr = document.getElementById('phoneErr');
if (phoneField && phoneErr) {
    phoneField.addEventListener('input', function() {
        const valid = /^[0-9]{10}$/.test(this.value) || this.value === '';
        phoneErr.style.display = this.value && !valid ? 'block' : 'none';
    });
}
</script>

</div>
</body>
</html>
