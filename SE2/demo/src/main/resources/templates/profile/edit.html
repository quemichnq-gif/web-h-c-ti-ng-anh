<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title>Edit Profile</title></head>
<body>
<div layout:fragment="content">

<div style="max-width:640px">
    <div style="margin-bottom:28px">
        <h1 style="font-size:24px;font-weight:800;margin-bottom:4px">Edit Profile</h1>
        <p style="color:#94a3b8;font-size:14px">Update your personal information</p>
    </div>
    <div th:if="${profileSuccess}" style="padding:14px 20px;border-radius:12px;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;font-weight:600;margin-bottom:20px" th:text="${profileSuccess}"></div>
    <div th:if="${error}" style="padding:14px 20px;border-radius:12px;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;font-weight:600;margin-bottom:20px" th:text="${error}"></div>
    <article class="chart-card">
        <div style="display:flex;align-items:center;gap:20px;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid #f1f5f9">
            <div id="avatarPreview" style="width:72px;height:72px;border-radius:16px;background:linear-gradient(135deg,#7c3aed,#2563eb);display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:800;overflow:hidden">
                <span th:text="${user.fullName != null ? user.fullName.substring(0,1).toUpperCase() : 'U'}">U</span>
            </div>
            <div>
                <div style="font-weight:700;font-size:16px" th:text="${user.fullName}">Full Name</div>
                <div style="color:#94a3b8;font-size:13px" th:text="${user.role}">ROLE</div>
                <label style="margin-top:8px;padding:6px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">
                    📷 Upload Photo
                    <input type="file" accept="image/*" style="display:none" onchange="previewAvatar(this)">
                </label>
            </div>
        </div>
        <form th:action="@{/profile/edit}" method="post">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
                <div class="field" style="grid-column: span 2">
                    <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:8px">Full Name *</label>
                    <input name="fullName" th:value="${user.fullName}" required style="width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;box-sizing:border-box">
                </div>
                <div class="field">
                    <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:8px">Email Address *</label>
                    <input name="email" type="email" th:value="${user.email}" required id="emailField" style="width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;box-sizing:border-box">
                </div>
                <div class="field">
                    <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:8px">Phone Number</label>
                    <input name="phone" th:value="${user.phone}" placeholder="0901234567" id="phoneField" style="width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;box-sizing:border-box">
                    <span id="phoneErr" style="color:#ef4444;font-size:12px;display:none">Must be 10 digits</span>
                </div>
                <div class="field">
                    <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:8px">Username</label>
                    <input th:value="${user.username}" disabled style="width:100%;border:1px solid #f1f5f9;border-radius:10px;padding:10px 14px;font-size:14px;background:#f8fafc;color:#94a3b8;box-sizing:border-box">
                </div>
                <div class="field">
                    <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:8px">System Role</label>
                    <input th:value="${user.role}" disabled style="width:100%;border:1px solid #f1f5f9;border-radius:10px;padding:10px 14px;font-size:14px;background:#f8fafc;color:#94a3b8;box-sizing:border-box">
                </div>
            </div>
            <div style="display:flex;gap:12px;margin-top:28px;padding-top:24px;border-top:1px solid #f1f5f9">
                <button type="submit" class="primary-button">Save Profile</button>
                <a th:href="@{/profile/change-password}" class="secondary-button">Change Password</a>
                <a th:href="@{/}" style="padding:10px 20px;border:1px solid #e2e8f0;border-radius:10px;font-weight:700;color:#64748b">Cancel</a>
            </div>
        </form>
    </article>
</div>
<script>
document.getElementById('phoneField').addEventListener('input', function() {
    const valid = /^[0-9]{10}$/.test(this.value) || this.value === '';
    document.getElementById('phoneErr').style.display = this.value && !valid ? 'block' : 'none';
});
function previewAvatar(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const p = document.getElementById('avatarPreview');
            p.innerHTML = '<img src="' + e.target.result + '" style="width:100%;height:100%;object-fit:cover">';
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>

</div>
</body>
</html>
