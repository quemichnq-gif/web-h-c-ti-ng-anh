<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title>My Profile</title></head>
<body>
<div layout:fragment="content">

<div style="max-width:800px">
    <h1 style="font-size:24px;font-weight:800;margin-bottom:24px">My Profile</h1>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <article class="chart-card">
            <h3 style="font-size:15px;font-weight:800;margin-bottom:20px">Personal Information</h3>
            <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
                <div style="width:64px;height:64px;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#2563eb);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:800"
                     th:text="${user.fullName != null ? user.fullName.substring(0,1).toUpperCase() : 'U'}">U</div>
                <div>
                    <div style="font-weight:800;font-size:17px" th:text="${user.fullName}">Name</div>
                    <div style="font-size:13px;color:#94a3b8" th:text="${user.role}">ROLE</div>
                </div>
            </div>
            <div style="display:grid;gap:12px">
                <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f8fafc">
                    <span style="font-size:13px;color:#64748b;font-weight:600">Username</span>
                    <span style="font-size:13px;font-weight:700;font-family:monospace" th:text="${user.username}">username</span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f8fafc">
                    <span style="font-size:13px;color:#64748b;font-weight:600">Email</span>
                    <span style="font-size:13px;font-weight:700" th:text="${user.email}">email</span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f8fafc">
                    <span style="font-size:13px;color:#64748b;font-weight:600">Phone</span>
                    <span style="font-size:13px;font-weight:700" th:text="${user.phone != null ? user.phone : 'Not set'}">phone</span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:10px 0">
                    <span style="font-size:13px;color:#64748b;font-weight:600">Status</span>
                    <span th:text="${user.status}" th:style="${user.status == 'ACTIVE' ? 'background:#dcfce7;color:#166534;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:800' : 'background:#f1f5f9;color:#64748b;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:800'}">ACTIVE</span>
                </div>
            </div>
            <div style="display:flex;gap:12px;margin-top:20px;padding-top:20px;border-top:1px solid #f1f5f9">
                <a th:href="@{/profile/edit}" class="primary-button">Edit Profile</a>
                <a th:href="@{/profile/change-password}" class="secondary-button">Change Password</a>
            </div>
        </article>
        <article class="chart-card">
            <h3 style="font-size:15px;font-weight:800;margin-bottom:20px">Quick Actions</h3>
            <div style="display:grid;gap:12px">
                <a th:href="@{/profile/edit}" style="display:flex;align-items:center;gap:14px;padding:16px;border:1px solid #f1f5f9;border-radius:12px;text-decoration:none">
                    <div style="width:36px;height:36px;border-radius:10px;background:#fdf2ff;display:flex;align-items:center;justify-content:center">✏️</div>
                    <div><div style="font-weight:700;font-size:14px">Edit Profile</div><div style="font-size:12px;color:#94a3b8">Update your information</div></div>
                </a>
                <a th:href="@{/profile/change-password}" style="display:flex;align-items:center;gap:14px;padding:16px;border:1px solid #f1f5f9;border-radius:12px;text-decoration:none">
                    <div style="width:36px;height:36px;border-radius:10px;background:#f0f9ff;display:flex;align-items:center;justify-content:center">🔐</div>
                    <div><div style="font-weight:700;font-size:14px">Change Password</div><div style="font-size:12px;color:#94a3b8">Update security credentials</div></div>
                </a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" style="display:flex;align-items:center;gap:14px;padding:16px;border:1px solid #fef2f2;border-radius:12px;background:none;cursor:pointer;width:100%">
                        <div style="width:36px;height:36px;border-radius:10px;background:#fef2f2;display:flex;align-items:center;justify-content:center">🚪</div>
                        <div style="text-align:left"><div style="font-weight:700;font-size:14px;color:#dc2626">Logout</div><div style="font-size:12px;color:#94a3b8">Sign out of Academic Portal</div></div>
                    </button>
                </form>
            </div>
        </article>
    </div>
</div>

</div>
</body>
</html>
